name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies (npm, bypassing yarn PnP)
        run: npm install --legacy-peer-deps

      - name: Generate app icons
        run: |
          npm install -D sharp
          node scripts/gen-icons.mjs

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            cap add android
          fi

      - name: Copy icons into Android res
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          node -e "
          const sharp = require('sharp');
          const sizes = {
            'mdpi':    48,
            'hdpi':    72,
            'xhdpi':   96,
            'xxhdpi':  144,
            'xxxhdpi': 192,
          };
          const fs = require('fs');
          const tasks = Object.entries(sizes).map(([dpi, px]) =>
            sharp('public/logo.svg').resize(px, px).png()
              .toFile('android/app/src/main/res/mipmap-' + dpi + '/ic_launcher.png')
          );
          Promise.all(tasks).then(() => console.log('Icons copied')).catch(e => { console.error(e); process.exit(1); });
          "

      - name: Sync web assets to Android
        run: cap sync android

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apex-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build summary
        if: always()
        run: |
          echo "## Apex APK Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            SIZE=$(du -sh android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "✅ **APK built successfully** — $SIZE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download from the **Artifacts** section of this run." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ APK build failed — check logs above." >> $GITHUB_STEP_SUMMARY
          fi
